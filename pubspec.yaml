name: free_reader
description: A private offline Bible reading app focused on a clean reading experience.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.20.3
  flutter_riverpod: ^2.5.1
  path: ^1.9.0
  path_provider: ^2.1.4
  sqlite3: ^3.3.4
  sqlite3_flutter_libs: ^0.5.24
  flex_color_scheme: ^8.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  drift_dev: ^2.20.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/db/bible.db
